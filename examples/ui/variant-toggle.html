<!doctype html>
<html lang="en" data-cvd="default">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CVD Variant Toggle</title>
    <link rel="stylesheet" href="../../tokens/color-tokens.css" />
    <style>
      body { font-family: system-ui, sans-serif; background: var(--surface); color: var(--text); padding: 2rem; }
      .card { background: var(--surface-subtle); border: 1px solid var(--border); padding: 1rem; border-radius: 8px; }
      .chip { display:inline-flex; align-items:center; gap:.5rem; border:1px solid var(--border); border-radius:999px; padding:.25rem .5rem; }
    </style>
  </head>
  <body>
    <h1>Colorblind-friendly UI (Indigo, Gray, Magenta)</h1>
    <p>Links are always <a class="link" href="#">underlined</a>. Focus uses a high-contrast ring.</p>

    <div class="card" tabindex="0" class="focus-ring">
      <p>Primary and secondary buttons demonstrate redundant cues.</p>
      <button class="btn-primary focus-ring">Primary</button>
      <button class="btn-secondary focus-ring">Secondary</button>
      <span class="chip hatch-diag">Paused</span>
    </div>

    <p style="margin-top:1rem;">Switch CVD variant:</p>
    <select id="variant">
      <option value="default">default</option>
      <option value="protan">protan</option>
      <option value="deutan">deutan</option>
      <option value="tritan">tritan</option>
      <option value="mono">mono</option>
    </select>

    <script>
      const sel = document.getElementById('variant');
      sel.addEventListener('change', () => {
        document.documentElement.setAttribute('data-cvd', sel.value);
      });
    </script>
  </body>
  <script src="../shared/auto-dev.js"></script>
  <script src="../shared/query-variant.js"></script>
  </html>
