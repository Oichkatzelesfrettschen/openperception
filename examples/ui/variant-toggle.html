<!doctype html>
<html lang="en" data-cvd="default">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Color-safe UI demo</title>
    <link rel="stylesheet" href="../../tokens/color-tokens.css" />
    <style>
      body { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 16px; line-height: 1.5; background: var(--surface); color: var(--text); padding: 2rem; }
      .page-nav { display: flex; flex-wrap: wrap; gap: .75rem; margin-bottom: 1rem; }
      .page-nav a { color: var(--link); text-decoration: underline; text-underline-offset: 2px; }
      .card { background: var(--surface-subtle); border: 1px solid var(--border); padding: 1rem; border-radius: 8px; }
      .demo-actions { display: flex; flex-wrap: wrap; gap: .75rem; align-items: center; }
      .chip { display:inline-flex; align-items:center; gap:.5rem; border:1px solid var(--border); border-radius:999px; padding:.25rem .5rem; }
      details { margin: 1rem 0; }
      @media (max-width: 640px) {
        body { padding: 1rem; }
        .card { padding: .875rem; }
      }
    </style>
  </head>
  <body
    data-hud-complexity="simple"
    data-cognitive-complex="true"
    data-panel-groups="1"
    data-metric-groups="0"
  >
    <nav class="page-nav" aria-label="Variant toggle sections" data-density-region="nav">
      <a href="#overview">Overview</a>
      <a href="#demo">Demo</a>
      <a href="#controls">Controls</a>
    </nav>

    <h1 id="overview">Color-safe UI demo</h1>
    <p>Links stay <a class="link" href="#">underlined</a>. Focus gets a clear ring.</p>
    <details data-summary-view="true" data-density-region="summary">
      <summary>What this page shows</summary>
      <p>One demo card, one variant switcher, and one live status line.</p>
    </details>
    <p class="chip" role="status" aria-live="polite" data-notification="status" data-density-region="status">The preview changes with the variant.</p>

    <div class="card focus-ring" id="demo" tabindex="0" data-density-region="demo">
      <p>These buttons show backup cues.</p>
      <div class="demo-actions" data-primary-actions="true">
        <button class="btn-primary focus-ring">Primary</button>
        <button class="btn-secondary focus-ring">Secondary</button>
        <span class="chip hatch-diag">Paused</span>
      </div>
    </div>

    <p id="controls" style="margin-top:1rem;">Choose a CVD variant:</p>
    <div data-density-region="controls" data-primary-actions="true">
      <select id="variant">
        <option value="default">default</option>
        <option value="protan">protan</option>
        <option value="deutan">deutan</option>
        <option value="tritan">tritan</option>
        <option value="mono">mono</option>
      </select>
    </div>

    <script>
      const sel = document.getElementById('variant');
      sel.addEventListener('change', () => {
        document.documentElement.setAttribute('data-cvd', sel.value);
      });
    </script>
  </body>
  <script src="../shared/auto-dev.js"></script>
  <script src="../shared/query-variant.js"></script>
  </html>
