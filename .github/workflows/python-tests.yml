# OpenPerception Python Test Workflow
# Runs pytest on DaltonLens-Python across multiple Python versions

name: Python Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'algorithms/DaltonLens-Python/**'
      - 'tools/**'
      - 'pyproject.toml'
      - '.github/workflows/python-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'algorithms/DaltonLens-Python/**'
      - 'tools/**'
      - 'pyproject.toml'
      - '.github/workflows/python-tests.yml'
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        exclude:
          # Python 3.8 not available on newer macOS
          - os: macos-latest
            python-version: '3.8'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy Pillow

      - name: Install DaltonLens-Python
        run: |
          pip install -e algorithms/DaltonLens-Python

      - name: Run tests with coverage
        run: |
          pytest algorithms/DaltonLens-Python/tests -v --cov=daltonlens --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python
          name: daltonlens-python
          fail_ci_if_error: false

  tools-test:
    name: Tools Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy Pillow

      - name: Install DaltonLens-Python
        run: |
          pip install -e algorithms/DaltonLens-Python

      - name: Run contrast check
        run: |
          python tools/contrast_check.py

      - name: Run separation check
        run: |
          python tools/separation_check.py

      - name: Test OKLCH generation
        run: |
          python tools/gen_oklch_tokens.py
