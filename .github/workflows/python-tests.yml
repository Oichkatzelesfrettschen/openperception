# OpenPerception Python Test Workflow
# Runs pytest on DaltonLens-Python across multiple Python versions

name: Python Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'algorithms/DaltonLens-Python/**'
      - 'tools/**'
      - 'examples/**'
      - 'Makefile'
      - 'pyproject.toml'
      - 'requirements-dev.txt'
      - '.github/workflows/python-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'algorithms/DaltonLens-Python/**'
      - 'tools/**'
      - 'examples/**'
      - 'Makefile'
      - 'pyproject.toml'
      - 'requirements-dev.txt'
      - '.github/workflows/python-tests.yml'
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13', '3.14']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy Pillow

      - name: Install DaltonLens-Python
        run: |
          pip install -e algorithms/DaltonLens-Python

      - name: Run tests with coverage
        run: |
          pytest algorithms/DaltonLens-Python/tests -v --cov=daltonlens --cov-report=xml --cov-report=term --cov-fail-under=70

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python
          name: daltonlens-python
          fail_ci_if_error: false

  tools-test:
    name: Tools Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy Pillow

      - name: Install DaltonLens-Python
        run: |
          pip install -e algorithms/DaltonLens-Python

      - name: Run tools tests
        run: |
          pytest tools/tests/ -v

      - name: Run contrast check
        run: |
          python tools/contrast_check.py

      - name: Run separation check
        run: |
          python tools/separation_check.py

      - name: Test OKLCH generation
        run: |
          python tools/gen_oklch_tokens.py

  rendered-audit:
    name: Rendered Audit (Dedicated Ubuntu Runner)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e algorithms/DaltonLens-Python -e python-packages/sphinx-brand-theme

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run rendered audits
        run: |
          make check-rendered PYTHON=python

  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit

      - name: Install DaltonLens-Python dependencies
        run: |
          pip install -e algorithms/DaltonLens-Python

      - name: Audit dependencies for known vulnerabilities
        run: |
          pip-audit
